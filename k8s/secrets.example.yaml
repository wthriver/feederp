# FeedMill ERP Secrets Template
# Copy this file to secrets.yaml and fill in actual values

apiVersion: v1
kind: Secret
metadata:
  name: feedmill-secrets
type: Opaque
stringData:
  # Database
  db-host: "postgres.default.svc.cluster.local"
  db-user: "feedmill"
  db-password: "CHANGE_ME"
  db-name: "feedmill_erp"

  # JWT Secrets (Generate with: openssl rand -base64 32)
  jwt-secret: "CHANGE_ME_at_least_32_characters"
  jwt-refresh-secret: "CHANGE_ME_another_32_chars"

  # Redis
  redis-url: "redis://redis.default.svc.cluster.local:6379"

  # SMTP (for emails)
  smtp-host: ""
  smtp-user: ""
  smtp-password: ""

  # External Services
  sentry-dsn: ""
  slack-webhook: ""