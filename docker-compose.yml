version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: feedmill-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: feedmill_erp
      POSTGRES_USER: ${DB_USER:-feedmill}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-feedmill_password}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - feedmill_postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-feedmill}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feedmill-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: feedmill-redis
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - feedmill_redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feedmill-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # Backend API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedmill-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3006
      DB_TYPE: postgresql
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: feedmill_erp
      DB_USER: ${DB_USER:-feedmill}
      DB_PASSWORD: ${DB_PASSWORD:-feedmill_password}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CACHE_TTL: ${CACHE_TTL:-300}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${API_PORT:-3006}:3006"
    volumes:
      - feedmill_logs:/app/logs
      - feedmill_uploads:/app/uploads
    networks:
      - feedmill-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: feedmill-nginx
    restart: unless-stopped
    depends_on:
      - api
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - feedmill_static:/var/www/static:ro
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    networks:
      - feedmill-network
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  feedmill_postgres_data:
  feedmill_redis_data:
  feedmill_logs:
  feedmill_uploads:
  feedmill_static:

networks:
  feedmill-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

# Development override
---
version: '3.8'
services:
  api:
    build:
      dockerfile: Dockerfile.dev
    environment:
      NODE_ENV: development
      DB_TYPE: sqlite
      DB_PATH: ./data/feedmill.db
      DISABLE_CACHE: "true"
    volumes:
      - ./server:/app/server
      - ./frontend:/app/frontend
      - ./data:/app/data
    ports:
      - "3006:3006"
      - "5173:5173"
    command: npm run dev