version: '3.8'

services:
  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: feedmill-erp-backend
    restart: always
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_TYPE=postgresql
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_NAME=feedmill_erp
      - DB_USER=${DB_USER:-feedmill}
      - DB_PASSWORD=${DB_PASSWORD:-feedmill123}
      - JWT_SECRET=${JWT_SECRET:-your-super-secret-jwt-key-change-in-production}
      - JWT_EXPIRY=8h
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    volumes:
      - ./uploads:/app/uploads
    networks:
      - feedmill-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: feedmill-erp-frontend
    restart: always
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - feedmill-network

  postgres:
    image: postgres:15-alpine
    container_name: feedmill-erp-db
    restart: always
    environment:
      - POSTGRES_DB=feedmill_erp
      - POSTGRES_USER=${DB_USER:-feedmill}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-feedmill123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - feedmill-network

  nginx:
    image: nginx:alpine
    container_name: feedmill-erp-proxy
    restart: always
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    ports:
      - "8080:80"
    depends_on:
      - backend
      - frontend
    networks:
      - feedmill-network

volumes:
  postgres_data:

networks:
  feedmill-network:
    driver: bridge
